<!--
 pagesfromceefax.com

 Jason Robson
 Twitter @pfceefax
 https://github.com/robsonjb1/PagesFromCeefax

 Attributions:
 - Displays news stories gathered from the BBC public RSS feeds

 - Header artwork was taken from REAL Ceefax pages using the BeebEm BBC Micro emulator (which supports Teletext adapters)
     and used a 'digital' feed of Teletext from some time in 2006.

 - Background TV image using licensed stock art imagery purchased from shutterstock.com

 - The audio was taken from the following YouTube video (attribution unknown)
 -   https://www.youtube.com/watch?v=JU8P5G-GM_g

 - Hosted using Microsoft Azure
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <title>Pages from Ceefax - Retro TV</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes" />
    <meta name="apple-mobile-web-app-title" content="Pages from Ceefax" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" value="A tribute to the in-vision Teletext service Ceefax, familiar to British TV viewers for over 30 years." />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="./lib/jquery.3.7.1.min.js"></script>
    <script type="module" src="./js/main.js"></script>
   
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="apple-touch-icon" href="apple-touch-icon-72x72.png">
</head>

<body>
    <div id="planner" class="alert-info">
        <table class="plannerTable groupOne">
            <tr id="channel0row"><td valign="top">
                <button id='channel0' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel0time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel0progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-1-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel0title"></span><div class="plannerDescription" id="channel0description"></div>
                </td>
            </tr>
            <tr id="channel1row"><td valign="top">
                <button id='channel1' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel1time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel1progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-2-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel1title"></span><div class="plannerDescription" id="channel1description"></div>
                </td>
            </tr>
            <tr id="channel2row"><td valign="top">
                <button id='channel2' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel2time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel2progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-3-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel2title"></span><div class="plannerDescription" id="channel2description"></div>
                </td>
            </tr>
            <tr id="channel3row"><td valign="top">
                <button id='channel3' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel3time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel3progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-4-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel3title"></span><div class="plannerDescription" id="channel3description"></div>
                </td>  
            </tr>
            <tr id="channel4row"><td valign="top">
                <button id='channel4' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel4time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel4progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-5-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel4title"></span><div class="plannerDescription" id="channel4description"></div>
                </td>
           </tr>
           <tr id="channel5row"><td valign="top">
            <button id='channel5' type="button" class="btn btn-outline-primary plannerButton">
                <nobr><span class="plannerStart" id="channel5time"></span></nobr>
                <div class="progress bg-info plannerProgress"><div id="channel5progress" class="progress-bar bg-warning" role="progressbar"></div></div>
            </button></td>
            <td class="plannerTitle">
                <span><i class="bi bi-6-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                <span id="channel5title"></span><div class="plannerDescription" id="channel5description"></div>
            </td>
       </tr>
        </table>
    
        <table class="plannerTable groupTwo">
            <tr id="channel6row"><td valign="top">
                <button id='channel6' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel6time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel6progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-7-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel6title"></span><div class="plannerDescription" id="channel6description"></div>
                </td>
            </tr>
            <tr id="channel7row"><td valign="top">
                <button id='channel7' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel7time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel7progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-8-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel7title"></span><div class="plannerDescription" id="channel7description"></div>
                </td>
            </tr>
            <tr id="channel8row"><td valign="top">
                <button id='channel8' type="button" class="btn btn-outline-primary plannerButton">
                    <nobr><span class="plannerStart" id="channel8time"></span></nobr>
                    <div class="progress bg-info plannerProgress"><div id="channel8progress" class="progress-bar bg-warning" role="progressbar"></div></div>
                </button></td>
                <td class="plannerTitle">
                    <span><i class="bi bi-9-square-fill channelToggleButton inTitleChannel"></i>&nbsp;</span>
                    <span id="channel8title"></span><div class="plannerDescription" id="channel8description"></div>
                </td>
            </tr>
        </table>

        <div style="display: flex; justify-content: space-between">
            <div class="plannerDescription">
                <button id="dummy" type="button" class="btn">
                    <div class="channelBanner topLogo">
                        <span id="videoChannelStrip">
                            <a id="channelButton0"><i id="channel0toggle" class="bi bi-1-square-fill channelToggleButton"></i></a>
                            <a id="channelButton1"><i id="channel1toggle" class="bi bi-2-square-fill channelToggleButton"></i></a>
                            <a id="channelButton2"><i id="channel2toggle" class="bi bi-3-square-fill channelToggleButton"></i></a>
                            <a id="channelButton3"><i id="channel3toggle" class="bi bi-4-square-fill channelToggleButton"></i></a>
                            <a id="channelButton4"><i id="channel4toggle" class="bi bi-5-square-fill channelToggleButton"></i></a>
                            <a id="channelButton5"><i id="channel5toggle" class="bi bi-6-square-fill channelToggleButton"></i></a>
                        </span>
                        <span id="audioChannelStrip" style="opacity: 20%">
                            <a id="channelButton6"><i id="channel6toggle" class="bi bi-7-square-fill channelToggleButton"></i></a>
                            <a id="channelButton7"><i id="channel7toggle" class="bi bi-8-square-fill channelToggleButton"></i></a>
                            <a id="channelButton8"><i id="channel8toggle" class="bi bi-9-square-fill channelToggleButton"></i></a>
                        </span>
                    </div>
                </button>
            </div>
            <div>
                <div class="plannerDescription">
                    <button id="toggleSpeaker" type="button" class="btn">
                        <div id="speaker" class="plannerDescription">
                            <div class="speakerIconBox"><i id="speakerIcon" class="bi bi-volume-up-fill speakerMute"></i></div>
                        </div>
                    </button>
                    <button id="toggleShowDurations" type="button" class="btn">
                        <div id="currentTime" class="plannerDescription"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <video id="videoCanvas" width="100%"></video>
    <div id="pfcOverlay" class="initially-hidden">
        <iframe src="../" id="pfcFrame"></iframe>
    </div>
</body>
</html>
